# Ban clients causing repeated suspicious 4xx responses on the Standard Notes vhosts.
# maxretry is intentionally high in the jail to avoid punishing real client auth flows.

[Definition]
failregex = ^<HOST> - .* "(?:GET|POST|HEAD|PUT|DELETE|PATCH|OPTIONS) .* HTTP/.*" (?:400|401|403|404|444) .*$
ignoreregex =
